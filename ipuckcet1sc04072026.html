<style>
  :root{
    --bg:#070b14;
    --bg2:#0e1729;
    --glow:#13c2c2;
    --glow2:#4f7cff;
    --card:#0f1826;
    --card-border:rgba(255,255,255,0.08);
    --ink:#eef2fb;
    --ink-soft:#aeb9d0;
    --muted:#6b778f;
    --chip:#141f30;
    --accent:#13c2c2;
    --accent2:#4f7cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(79,124,255,0.22), transparent 60%),
      radial-gradient(800px 500px at 90% 0%, rgba(19,194,194,0.20), transparent 55%),
      linear-gradient(180deg, var(--bg2), var(--bg) 60%);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:44px 18px 60px;
  }
  .wrap{width:100%;max-width:640px;}

  /* Header */
  .brand{text-align:center;margin-bottom:8px;}
  .crest{
    width:64px;height:64px;margin:0 auto 16px;
    border-radius:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#04121f;
    box-shadow:0 10px 30px rgba(19,194,194,0.35);
  }
  .brand h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.9rem;
    letter-spacing:-0.4px;
    line-height:1.15;
    background:linear-gradient(180deg,#ffffff,#c7d2ea);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .subline{color:var(--ink-soft);font-size:0.9rem;margin-top:6px;font-weight:500;}
  .badge-pill{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:18px;
    padding:9px 18px;
    border-radius:999px;
    border:1px solid rgba(19,194,194,0.35);
    background:rgba(19,194,194,0.08);
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.78rem;
    letter-spacing:0.6px;
    color:#8ff0f0;
  }
  .badge-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}

  /* Card */
  .card{
    position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid var(--card-border);
    border-radius:24px;
    padding:24px;
    margin-top:26px;
    backdrop-filter:blur(14px);
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:24px;padding:1px;
    background:linear-gradient(135deg, rgba(19,194,194,0.5), transparent 40%, rgba(79,124,255,0.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.6;
  }

  .search-row{display:flex;gap:10px;position:relative;z-index:1;}
  .input-wrap{flex:1;position:relative;}
  .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:0.55;}
  .search-row input{
    width:100%;
    padding:14px 16px 14px 42px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.03);
    font-size:0.95rem;
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--ink);
    outline:none;
    text-transform:uppercase;
    transition:border .2s, box-shadow .2s;
  }
  .search-row input::placeholder{color:#5c6884;text-transform:none;}
  .search-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(19,194,194,0.18);}
  .btn{
    padding:14px 20px;
    border-radius:14px;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .12s, filter .2s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-search{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04121f;}
  .btn-search:hover{filter:brightness(1.08);}
  .btn-print{background:rgba(255,255,255,0.08);color:var(--ink);border:1px solid rgba(255,255,255,0.12);}
  .btn-print:hover{background:rgba(255,255,255,0.14);}

  .error{
    display:none;
    margin-top:14px;
    padding:11px 14px;
    border-radius:12px;
    background:rgba(255,90,110,0.10);
    border:1px solid rgba(255,90,110,0.35);
    color:#ff9aa8;
    font-size:0.83rem;
    position:relative;z-index:1;
  }

  /* Result */
  .result{display:none;margin-top:22px;position:relative;z-index:1;}
  .result-header{display:flex;align-items:center;gap:15px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .avatar{
    width:56px;height:56px;border-radius:16px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#04121f;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.2rem;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 8px 22px rgba(79,124,255,0.35);
  }
  .result-header .rname{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.2rem;color:var(--ink);}
  .result-header .rmeta{color:var(--muted);font-size:0.85rem;margin-top:3px;letter-spacing:0.3px;}

  .subject-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:20px;
  }
  .subject-box{
    position:relative;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:16px 16px 15px;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    overflow:hidden;
  }
  .subject-box::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));
    opacity:0.85;
  }
  .subject-box .label{color:var(--ink-soft);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.6px;font-weight:600;}
  .subject-box .value{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.7rem;color:#ffc93c;margin-top:6px;line-height:1;text-shadow:0 0 18px rgba(255,201,60,0.35);}
  .subject-box .value .slash{color:var(--muted);font-size:1rem;font-weight:500;}
  .subject-box .maxline{color:var(--muted);font-size:0.75rem;margin-top:5px;}
  .subject-box.absent::after{background:linear-gradient(180deg,#f0a33c,#e0724a);}
  .subject-box.absent .value{color:#f4b45f;}

  .back-link{
    display:inline-flex;align-items:center;gap:6px;margin-top:20px;color:var(--ink-soft);
    font-size:0.86rem;font-weight:600;cursor:pointer;
  }
  .back-link:hover{color:var(--accent);}

  .footer{text-align:center;margin-top:26px;color:#586179;font-size:0.8rem;}
  .footer b{color:#9fb0d0;}

  @media print{
    body{background:#fff;color:#000;padding:0;}
    .brand h1{color:#000;-webkit-text-fill-color:#000;}
    .subline,.footer{color:#000;}
    .badge-pill{border-color:#000;color:#000;background:none;}
    .search-row,.back-link{display:none !important;}
    .card{box-shadow:none;border:1px solid #ccc;background:#fff;backdrop-filter:none;}
    .card::before{display:none;}
    .subject-box{background:#fff;}
    .subject-box .value{color:#b8860b;text-shadow:none;}
    .avatar{color:#fff;}
  }
</style>

function initials(name){
  const parts = name.trim().split(/\s+/);
  let out = parts[0][0];
  if(parts.length > 1) out += parts[1][0];
  return out.toUpperCase();
}

function lookupResult(){
  const val = document.getElementById('rollInput').value.trim().toUpperCase();
  const errBox = document.getElementById('errorMsg');
  errBox.style.display = 'none';
  if(!val){
    errBox.textContent = 'Please enter your SATS Number.';
    errBox.style.display = 'block';
    return;
  }
  const student = students.find(s => s.roll.toUpperCase() === val);
  if(!student){
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('printBtn').style.display = 'none';
    errBox.textContent = 'No record found for this SATS Number. Please check and try again.';
    errBox.style.display = 'block';
    return;
  }
  showResult(student);
}

function showResult(student){
  document.getElementById('rAvatar').textContent = initials(student.name);
  document.getElementById('rName').textContent = student.name;
  document.getElementById('rMeta').textContent = 'SATS No. ' + student.roll;

  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = '';

  student.subjects.forEach(sub => {
    const isAbsent = (typeof sub.marks === 'string' && sub.marks.toUpperCase() === 'AB');
    const box = document.createElement('div');
    box.className = 'subject-box' + (isAbsent ? ' absent' : '');
    const valueText = isAbsent
      ? 'AB'
      : sub.marks + '<span class="slash"> / ' + sub.max + '</span>';
    box.innerHTML = '<div class="label">' + sub.name + '</div>' +
                     '<div class="value">' + valueText + '</div>' +
                     '<div class="maxline">Max marks: ' + sub.max + '</div>';
    grid.appendChild(box);
  });

  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('printBtn').style.display = 'inline-block';
}

function resetForm(){
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('printBtn').style.display = 'none';
  document.getElementById('rollInput').value = '';
  document.getElementById('errorMsg').style.display = 'none';
}

document.getElementById('rollInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') lookupResult();
});
</script>
